name: Rebuild Stage CI

on:
  push:
    paths:
      - 'src/rebuild/**'
      - 'src/config/constants.py'
      - 'src/governance/**'
      - 'src/distill/**'
  pull_request:
    paths:
      - 'src/rebuild/**'
      - 'src/config/constants.py'
      - 'src/governance/**'
      - 'src/distill/**'
  workflow_dispatch:

jobs:
  rebuild-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run Rebuild tests
        run: |
          pytest src/tests/ -v -k rebuild

      - name: Integration tests
        run: |
          pytest src/tests/ -v -k "integration"

      - name: Type check
        run: |
          mypy src/rebuild/

      - name: Security scan
        run: |
          pip install bandit
          bandit -r src/rebuild/
