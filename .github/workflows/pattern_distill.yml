name: Pattern Distill Stage CI

on:
  push:
    paths:
      - 'src/distill/**'
      - 'src/config/constants.py'
      - 'src/atomic_layer/**'
      - 'src/hmv/**'
  pull_request:
    paths:
      - 'src/distill/**'
      - 'src/config/constants.py'
      - 'src/atomic_layer/**'
      - 'src/hmv/**'
  workflow_dispatch:

jobs:
  distill-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,hnsw]"

      - name: Run Distill tests
        run: |
          pytest src/tests/ -v -k distill

      - name: Type check
        run: |
          mypy src/distill/

      - name: Test HNSW indexing
        run: |
          python -c "import hnswlib; print('HNSW available')"
