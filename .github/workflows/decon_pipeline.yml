name: Deconstruct Stage CI

on:
  push:
    paths:
      - 'src/decon/**'
      - 'src/config/constants.py'
      - 'src/atomic_layer/**'
  pull_request:
    paths:
      - 'src/decon/**'
      - 'src/config/constants.py'
      - 'src/atomic_layer/**'
  workflow_dispatch:

jobs:
  decon-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Deconstruct tests
        run: |
          pytest src/tests/ -v -k decon

      - name: Type check
        run: |
          mypy src/decon/
